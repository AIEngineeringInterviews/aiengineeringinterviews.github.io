<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title | default: site.title }}</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #24292f;
      background: #ffffff;
    }

    main {
      max-width: 850px;
      margin: 40px auto;
      padding: 0 24px;
      line-height: 1.65;
      font-size: 17px;
    }

    img {
      display: block;
      width: 100%;
      max-width: 760px;
      height: auto;
      margin: 28px auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }

    p {
      margin-bottom: 1rem;
    }

    blockquote {
      border-left: 4px solid #d0d7de;
      padding-left: 16px;
      color: #57606a;
    }

    mjx-container {
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
    }
  </style>

  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
